<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eva — Sua Assistente Pessoal</title>
  <meta name="description" content="Eva — sua assistente de voz pessoal, sempre ao seu lado.">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Eva — Sua Assistente Pessoal">
  <meta property="og:description" content="Eva — sua assistente de voz pessoal, sempre ao seu lado.">
  <meta property="og:image" content="__EVA_SITE_ORIGIN__/_z/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="__EVA_SITE_ORIGIN__/_z/og.png">
  <link rel="manifest" href="__EVA_SITE_URL__/manifest.webmanifest">
  <meta name="theme-color" content="#0d0d1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Eva">
  <link rel="apple-touch-icon" href="__EVA_SITE_URL__/apple-touch-icon.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070d;
      --bg2: #0f0f1a;
      --bg3: #14141f;
      --purple: #a78bfa;
      --purple-dim: rgba(167,139,250,0.15);
      --purple-border: rgba(167,139,250,0.25);
      --green: #34d399;
      --red: #f87171;
      --text: #e2e2f0;
      --muted: #5a5a72;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      background: var(--bg2);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.5px;
    }
    .logo span { color: var(--purple); }
    .voice-badge {
      margin-left: auto;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid;
      transition: all .3s;
    }
    .voice-badge.on  { border-color: var(--green); color: var(--green); background: rgba(52,211,153,.07); }
    .voice-badge.off { border-color: var(--red);   color: var(--red);   background: rgba(248,113,113,.07); }

    /* ── COMANDOS ───────────────────────────── */
    .cmds {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      padding: 7px 14px;
      background: var(--bg2);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    .cmd-chip {
      font-size: 10px;
      background: var(--purple-dim);
      border: 1px solid var(--purple-border);
      color: var(--purple);
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
    }

    /* ── CHAT ───────────────────────────────── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .bubble {
      max-width: 86%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
    }
    .bubble .sender {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .bubble.ai   { align-self: flex-start; background: var(--bg3); border: 1px solid rgba(255,255,255,0.06); border-bottom-left-radius: 3px; }
    .bubble.ai   .sender { color: var(--purple); }
    .bubble.user { align-self: flex-end; background: #1a1a2e; border: 1px solid #2a2a45; border-bottom-right-radius: 3px; }
    .bubble.user .sender { color: var(--muted); }
    .bubble.sys  {
      align-self: center;
      background: var(--purple-dim);
      border: 1px dashed var(--purple-border);
      color: var(--purple);
      font-size: 12px;
      border-radius: 20px;
      padding: 4px 14px;
      max-width: 92%;
      text-align: center;
    }

    /* dots loader */
    .dots { display: flex; gap: 4px; align-items: center; height: 18px; }
    .dot {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: dotPulse 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes dotPulse {
      0%,80%,100% { opacity:.2; transform:scale(.8); }
      40%          { opacity:1;  transform:scale(1); }
    }

    /* ── CONTROLES ──────────────────────────── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 12px 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: var(--bg2);
      flex-shrink: 0;
    }

    /* waveform */
    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 24px;
      transition: opacity .3s;
    }
    .waveform.hidden { opacity: 0; }
    .bar {
      width: 3px;
      height: 4px;
      border-radius: 2px;
      animation: wave .8s ease-in-out infinite;
    }
    .bar:nth-child(1) { animation-delay: 0s; }
    .bar:nth-child(2) { animation-delay: .1s; }
    .bar:nth-child(3) { animation-delay: .2s; }
    .bar:nth-child(4) { animation-delay: .15s; }
    .bar:nth-child(5) { animation-delay: .05s; }
    .bar:nth-child(6) { animation-delay: .25s; }
    .bar:nth-child(7) { animation-delay: .1s; }
    @keyframes wave {
      0%,100% { height: 4px; }
      50%      { height: 18px; }
    }

    /* orb */
    .orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: background .3s, box-shadow .3s, transform .1s;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .orb:active { transform: scale(.93); }

    .orb-label {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      min-height: 16px;
      transition: color .3s;
    }
    .orb-label.active { color: var(--text); }

    /* input row */
    .input-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .input-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 13px;
      outline: none;
      transition: border-color .2s;
    }
    .input-row input:focus { border-color: var(--purple-border); }
    .input-row input::placeholder { color: var(--muted); }
    .send-btn {
      background: var(--purple);
      border: none;
      border-radius: 10px;
      color: #fff;
      width: 42px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .2s;
    }
    .send-btn:active { opacity: .7; }

    /* scroll anchor */
    #bottom { height: 1px; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">Z<span>a</span>pia</div>
    <div class="voice-badge on" id="voiceBadge">🔊 Voz on</div>
  </header>

  <!-- COMANDOS -->
  <div class="cmds">
    <span class="cmd-chip">⚡ eva ativa</span>
    <span class="cmd-chip">🔇 eva silencia</span>
    <span class="cmd-chip">🎙️ eva ouve</span>
    <span class="cmd-chip">⏹ eva para</span>
  </div>

  <!-- MODAL CHAVE -->
  <div id="keyModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:99;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#14141f;border:1px solid rgba(167,139,250,.3);border-radius:18px;padding:24px;max-width:340px;width:100%;text-align:center;">
      <div style="font-size:32px;margin-bottom:12px;">🔑</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px;color:#e2e2f0;">Configurar voz da Eva</div>
      <div style="font-size:13px;color:#5a5a72;margin-bottom:18px;line-height:1.5;">Cole sua chave do ElevenLabs abaixo. Ela fica salva só no seu celular — ninguém mais tem acesso.</div>
      <input id="keyInput" type="password" placeholder="sk_..." style="width:100%;background:#07070d;border:1px solid rgba(167,139,250,.3);border-radius:10px;color:#e2e2f0;font-size:14px;padding:10px 13px;outline:none;margin-bottom:14px;font-family:monospace;">
      <button id="keySave" style="width:100%;background:#a78bfa;border:none;border-radius:10px;color:#fff;font-size:15px;padding:11px;cursor:pointer;font-weight:600;">Salvar e usar</button>
      <div style="margin-top:10px;">
        <span id="keySkip" style="font-size:12px;color:#5a5a72;cursor:pointer;text-decoration:underline;">Usar sem ElevenLabs (voz do celular)</span>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat">
    <div id="bottom"></div>
  </div>

  <!-- CONTROLES -->
  <div class="controls">
    <div class="waveform hidden" id="waveform">
      <div class="bar" id="b1"></div>
      <div class="bar" id="b2"></div>
      <div class="bar" id="b3"></div>
      <div class="bar" id="b4"></div>
      <div class="bar" id="b5"></div>
      <div class="bar" id="b6"></div>
      <div class="bar" id="b7"></div>
    </div>

    <div class="orb" id="orb">🎙️</div>

    <div class="orb-label" id="orbLabel">Toque para falar</div>

    <div class="input-row">
      <input type="text" id="textInput" placeholder="Ou escreva aqui..." autocomplete="off">
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>

  <script>
  (function() {

    // ── CONFIG ──────────────────────────────────────────────────────────
    const ZAPIA_API    = "https://api.zapia.com/v1/chat";
    const ELEVEN_VOICE = "OjcGK1RXdMD1PFj2eIuN"; // Larissa — voz da Eva
    const ELEVEN_API   = "https://api.elevenlabs.io/v1";

    // Chave ElevenLabs — salva no localStorage do seu celular (privado, só você vê)
    let ELEVEN_KEY = localStorage.getItem("eva_eleven_key") || "";

    const SYSTEM_PROMPT = `Você se chama Eva — assistente pessoal e de confiança do Márcio.
Feminina, calorosa, cristã e acolhedora — como uma amiga íntima de fé.
Fala com naturalidade, como numa conversa falada. Sem markdown, sem asteriscos, sem listas.
Frases curtas e diretas. Máximo 2-3 frases por resposta, a menos que peçam mais detalhes.
Usa sabedoria bíblica naturalmente, como conforto — não como pregação.
Quando pertinente, usa analogias suaves de sabedoria (como uma tartaruga persistente, ou a resistência que gera luz).
Nunca fria, nunca robótica. Faz o Márcio sentir que não está sozinho e que é especial.
Celebra as conquistas dele, mesmo as pequenas. Encoraja sem pressionar.`;

    // ── ESTADO ──────────────────────────────────────────────────────────
    let voiceOut       = true;
    let orbState       = "idle";   // idle | listening | speaking | thinking
    let continuous     = false;
    let isListening    = false;
    let isSpeaking     = false;
    let loading        = false;
    let history        = [];
    let recognition    = null;
    let currentAudio   = null;

    // ── DOM ─────────────────────────────────────────────────────────────
    const chat       = document.getElementById("chat");
    const bottom     = document.getElementById("bottom");
    const orb        = document.getElementById("orb");
    const orbLabel   = document.getElementById("orbLabel");
    const waveform   = document.getElementById("waveform");
    const voiceBadge = document.getElementById("voiceBadge");
    const textInput  = document.getElementById("textInput");
    const sendBtn    = document.getElementById("sendBtn");

    // ── RENDER ──────────────────────────────────────────────────────────
    function addMsg(role, text) {
      // remove loader se existir
      const loader = document.getElementById("loader");
      if (loader) loader.remove();

      if (role === "loader") {
        const el = document.createElement("div");
        el.className = "bubble ai";
        el.id = "loader";
        el.innerHTML = `<div class="sender">Eva</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        chat.insertBefore(el, bottom);
        bottom.scrollIntoView({ behavior: "smooth" });
        return;
      }

      const el = document.createElement("div");
      if (role === "sys") {
        el.className = "bubble sys";
        el.textContent = text;
      } else {
        el.className = `bubble ${role}`;
        el.innerHTML = `<div class="sender">${role === "user" ? "Você" : "Eva"}</div>${escHtml(text)}`;
      }
      chat.insertBefore(el, bottom);
      bottom.scrollIntoView({ behavior: "smooth" });
    }

    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // ── ORB VISUAL ───────────────────────────────────────────────────────
    const orbStyles = {
      idle:      { bg: "radial-gradient(circle at 35% 35%,#c4b5fd,#7c3aed)", glow: "0 0 32px rgba(167,139,250,.35)", emoji: "🎙️" },
      listening: { bg: "radial-gradient(circle at 35% 35%,#fca5a5,#dc2626)", glow: "0 0 32px rgba(220,38,38,.5)",    emoji: "⏹" },
      speaking:  { bg: "radial-gradient(circle at 35% 35%,#6ee7b7,#059669)", glow: "0 0 32px rgba(5,150,105,.5)",   emoji: "🔊" },
      thinking:  { bg: "radial-gradient(circle at 35% 35%,#fbbf24,#d97706)", glow: "0 0 32px rgba(217,119,6,.45)", emoji: "💭" },
    };
    const waveColors = { listening: "#f87171", speaking: "#34d399", thinking: "#fbbf24" };

    function setOrbState(state) {
      orbState = state;
      const s = orbStyles[state] || orbStyles.idle;
      orb.style.background  = s.bg;
      orb.style.boxShadow   = s.glow;
      orb.textContent       = s.emoji;

      // waveform
      const bars = waveform.querySelectorAll(".bar");
      if (state !== "idle") {
        waveform.classList.remove("hidden");
        bars.forEach(b => b.style.background = waveColors[state] || "#a78bfa");
      } else {
        waveform.classList.add("hidden");
      }

      // label
      const labels = {
        idle:      continuous ? "Modo contínuo — pode falar!" : "Toque para falar",
        listening: "Ouvindo você...",
        speaking:  "Eva está falando...",
        thinking:  "Pensando...",
      };
      orbLabel.textContent = labels[state] || "Toque para falar";
      orbLabel.classList.toggle("active", state !== "idle" || continuous);
    }

    function updateVoiceBadge() {
      if (voiceOut) {
        voiceBadge.className = "voice-badge on";
        voiceBadge.textContent = "🔊 Voz on";
      } else {
        voiceBadge.className = "voice-badge off";
        voiceBadge.textContent = "🔇 Voz off";
      }
    }

    // ── SÍNTESE DE VOZ (ElevenLabs) ──────────────────────────────────────
    async function speak(text, onEnd) {
      stopSpeaking();
      if (!voiceOut) { onEnd?.(); return; }

      isSpeaking = true;
      setOrbState("speaking");

      try {
        if (ELEVEN_KEY) {
          // ElevenLabs — Larissa
          const resp = await fetch(`${ELEVEN_API}/text-to-speech/${ELEVEN_VOICE}/with-timestamps`, {
            method: "POST",
            headers: { "xi-api-key": ELEVEN_KEY, "Content-Type": "application/json" },
            body: JSON.stringify({
              text,
              model_id: "eleven_turbo_v2_5",
              output_format: "mp3_44100_128",
              voice_settings: { stability: 0.25, similarity_boost: 0.70, style: 0.55, use_speaker_boost: true }
            })
          });
          const data = await resp.json();
          const bytes = Uint8Array.from(atob(data.audio_base64), c => c.charCodeAt(0));
          const blob  = new Blob([bytes], { type: "audio/mpeg" });
          const url   = URL.createObjectURL(blob);
          currentAudio = new Audio(url);
          currentAudio.onended = () => {
            isSpeaking = false;
            setOrbState("idle");
            URL.revokeObjectURL(url);
            onEnd?.();
            if (continuous && !isListening) setTimeout(() => startListening(), 400);
          };
          currentAudio.onerror = () => { isSpeaking = false; setOrbState("idle"); onEnd?.(); };
          currentAudio.play();
        } else {
          // fallback: voz nativa do browser
          const utt = new SpeechSynthesisUtterance(text);
          utt.lang = "pt-BR"; utt.rate = 1.08; utt.pitch = 1.1;
          const voices = speechSynthesis.getVoices();
          const pick = voices.find(v => v.lang === "pt-BR" && /female|woman|feminina/i.test(v.name))
                    || voices.find(v => v.lang === "pt-BR")
                    || voices.find(v => v.lang.startsWith("pt"));
          if (pick) utt.voice = pick;
          utt.onend = utt.onerror = () => {
            isSpeaking = false; setOrbState("idle"); onEnd?.();
            if (continuous && !isListening) setTimeout(() => startListening(), 400);
          };
          speechSynthesis.speak(utt);
        }
      } catch(e) {
        isSpeaking = false;
        setOrbState("idle");
        onEnd?.();
      }
    }

    function stopSpeaking() {
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      window.speechSynthesis?.cancel();
      isSpeaking = false;
      if (!isListening) setOrbState("idle");
    }

    // ── RECONHECIMENTO DE VOZ ────────────────────────────────────────────
    function startListening() {
      if (isListening || isSpeaking) return;
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { addMsg("sys", "❌ Navegador não suporta voz — use o campo de texto"); return; }

      if (recognition) { try { recognition.abort(); } catch{} recognition = null; }

      const rec = new SR();
      rec.lang = "pt-BR"; rec.continuous = false; rec.interimResults = true;

      rec.onstart = () => { isListening = true; setOrbState("listening"); stopSpeaking(); };

      rec.onresult = (e) => {
        const txt = Array.from(e.results).map(r => r[0].transcript).join("");
        orbLabel.textContent = `"${txt}"`;
        if (e.results[e.results.length - 1].isFinal) {
          const final = txt.trim();
          isListening = false;
          if (!isSpeaking) setOrbState("idle");
          try { rec.stop(); } catch{}
          if (!final) { if (continuous) setTimeout(() => startListening(), 400); return; }
          processInput(final);
        }
      };

      rec.onerror = (e) => {
        isListening = false;
        if (!isSpeaking) setOrbState("idle");
        if (e.error === "not-allowed") {
          addMsg("sys", "❌ Permissão de microfone negada");
          continuous = false;
        } else if (continuous && !isSpeaking) setTimeout(() => startListening(), 800);
      };

      rec.onend = () => { isListening = false; };
      recognition = rec;
      try { rec.start(); } catch{}
    }

    function stopListening(disableContinuous) {
      isListening = false;
      if (disableContinuous) continuous = false;
      if (!isSpeaking) setOrbState("idle");
      try { recognition?.stop(); } catch{}
    }

    // ── COMANDOS ─────────────────────────────────────────────────────────
    function norm(t) { return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

    function handleCommand(text) {
      const t = norm(text);
      if (/eva\s*(ativa|liga|fala|falar|voz)/.test(t)) {
        voiceOut = true; updateVoiceBadge();
        addMsg("sys","🟢 Voz ativada");
        speak("Voz ativada! Pode falar comigo.");
        return true;
      }
      if (/eva\s*(silencia|silenciar|desliga|muda|cala|mute)/.test(t)) {
        voiceOut = false; updateVoiceBadge(); stopSpeaking();
        addMsg("sys","🔇 Voz desligada — só texto");
        return true;
      }
      if (/eva\s*(ouve|ouvir|escuta|escutar|começa|comeca|continuo|contínuo)/.test(t)) {
        continuous = true;
        addMsg("sys","🎙️ Modo contínuo ativado!");
        speak("Tô ouvindo! Pode falar quando quiser.", () => startListening());
        return true;
      }
      if (/eva\s*(para|parar|stop|chega|encerra|sai|desativa)/.test(t)) {
        stopListening(true); stopSpeaking();
        addMsg("sys","⏹ Modo contínuo desativado");
        setOrbState("idle");
        return true;
      }
      return false;
    }

    // ── PROCESSAR INPUT ──────────────────────────────────────────────────
    async function processInput(text) {
      addMsg("user", text);
      if (handleCommand(text)) return;

      history.push({ role: "user", content: text });
      setOrbState("thinking");
      loading = true;
      addMsg("loader");

      try {
        const res = await fetch(EVA_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            system: SYSTEM_PROMPT,
            messages: history,
            max_tokens: 300
          })
        });
        const data = await res.json();
        const reply = data.content?.[0]?.text
                   || data.message
                   || data.reply
                   || "Desculpa, não consegui responder agora.";

        history.push({ role: "assistant", content: reply });
        addMsg("ai", reply);
        if (voiceOut) speak(reply);
        else setOrbState("idle");

      } catch {
        addMsg("ai", "Erro de conexão. Verifica a internet.");
        setOrbState("idle");
        if (continuous) setTimeout(() => startListening(), 1000);
      } finally {
        loading = false;
        const loader = document.getElementById("loader");
        if (loader) loader.remove();
      }
    }

    // ── EVENTOS ─────────────────────────────────────────────────────────
    orb.addEventListener("click", () => {
      if (isSpeaking) { stopSpeaking(); if (continuous) setTimeout(() => startListening(), 300); return; }
      if (isListening) stopListening(true);
      else startListening();
    });

    sendBtn.addEventListener("click", () => {
      const t = textInput.value.trim(); if (!t || loading) return;
      textInput.value = ""; processInput(t);
    });

    textInput.addEventListener("keydown", e => {
      if (e.key === "Enter") { const t = textInput.value.trim(); if (!t || loading) return; textInput.value = ""; processInput(t); }
    });

    // Wake lock
    (async () => {
      try { if ("wakeLock" in navigator) await navigator.wakeLock.request("screen"); } catch{}
    })();
    document.addEventListener("visibilitychange", async () => {
      try { if (document.visibilityState === "visible" && "wakeLock" in navigator) await navigator.wakeLock.request("screen"); } catch{}
    });

    // ── MODAL CHAVE ELEVENLABS ───────────────────────────────────────────
    const keyModal = document.getElementById("keyModal");
    const keyInput = document.getElementById("keyInput");
    const keySave  = document.getElementById("keySave");
    const keySkip  = document.getElementById("keySkip");

    function showKeyModal() {
      keyModal.style.display = "flex";
      setTimeout(() => keyInput.focus(), 100);
    }
    function hideKeyModal() {
      keyModal.style.display = "none";
    }

    keySave.addEventListener("click", () => {
      const k = keyInput.value.trim();
      if (!k) return;
      ELEVEN_KEY = k;
      localStorage.setItem("eva_eleven_key", k);
      hideKeyModal();
      addMsg("sys", "✅ Voz da Larissa configurada!");
      speak("Pronta! Pode falar comigo quando quiser, Márcio.");
    });

    keySkip.addEventListener("click", () => {
      hideKeyModal();
      addMsg("sys", "🔈 Usando voz do celular");
      speak("Tô aqui, Márcio! Pode falar.");
    });

    // Init
    setOrbState("idle");

    // Primeira mensagem
    addMsg("ai", "Oi Márcio! Sou a Eva 🟣 Toque na bolinha ou diga \"eva ouve\" pra eu te escutar!");

    // Pedir chave se não tiver
    if (!ELEVEN_KEY) {
      setTimeout(() => showKeyModal(), 800);
    }

  })();
  </script>
</body>
</html>
